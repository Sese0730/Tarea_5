<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Tokyo | El Futuro es Hoy</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500&display=swap" rel="stylesheet">
</head>
<body>

    <main class="glass-card">

            <h1 class="glow-text">NEON TOKYO</h1>
            <div class="badge">Destino 2077</div>

        <section class="content">
            <div class="image-container">
                <img src="tu-imagen-aqui.jpg" alt="Vista de la ciudad" class="main-img">

            <p class="description">
                Explora la convergencia entre la tecnología ancestral y el brillo del neón.

                y la cultura tradicional japonesa crean una experiencia sensorial inigualable.
            </p>

            <a href="#" class="btn-epic">Reservar mi Viaje</a>

    <div class="background-animation"></div>
